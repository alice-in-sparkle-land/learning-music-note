<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Note Reader — Lyre & Guzheng</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --paper: #f5f0e8;
    --paper2: #ede7d5;
    --accent: #c0392b;
    --gold: #b8860b;
    --line: #8b7355;
    --correct: #2e7d32;
    --wrong: #c0392b;
    --staff-line: #3a2e1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(139,115,85,0.08) 27px, rgba(139,115,85,0.08) 28px);
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-family: 'Noto Serif', serif;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--ink);
  }

  header h1 span { color: var(--accent); }

  header p {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--line);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Instrument selector */
  .inst-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 22px;
    background: var(--paper2);
    border: 1.5px solid var(--line);
    border-radius: 4px;
    padding: 4px;
  }

  .inst-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    padding: 7px 18px;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    background: transparent;
    color: var(--line);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.18s;
  }
  .inst-btn.active {
    background: var(--ink);
    color: var(--paper);
  }

  /* Score bar */
  .score-bar {
    display: flex;
    gap: 28px;
    margin-bottom: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--line);
    letter-spacing: 0.06em;
  }
  .score-bar span { color: var(--ink); font-weight: 700; }

  /* Card */
  .card {
    background: white;
    border: 1.5px solid #c9b99a;
    border-radius: 6px;
    width: 100%;
    max-width: 560px;
    padding: 28px 24px 24px;
    box-shadow: 4px 6px 0 #c9b99a44;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* Notation mode tabs */
  .notation-tabs {
    display: flex;
    gap: 6px;
    align-self: flex-end;
  }
  .ntab {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    padding: 3px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    cursor: pointer;
    background: transparent;
    color: var(--line);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: all 0.15s;
  }
  .ntab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* Staff SVG area */
  #staff-area {
    width: 100%;
    display: flex;
    justify-content: center;
  }

  /* Jianpu display */
  #jianpu-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  #jianpu-area.visible { display: flex; }

  .jianpu-number {
    font-family: 'Space Mono', monospace;
    font-size: 4rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    position: relative;
    display: inline-block;
  }
  .jianpu-dots-above, .jianpu-dots-below {
    font-size: 1.2rem;
    color: var(--ink);
    text-align: center;
    letter-spacing: 0.3em;
    line-height: 1;
  }
  .jianpu-dots-above { margin-bottom: 2px; }
  .jianpu-dots-below { margin-top: 2px; }

  /* Answer buttons */
  .answers {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 100%;
  }

  .ans-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.88rem;
    padding: 11px 6px;
    border: 1.5px solid #c9b99a;
    border-radius: 3px;
    cursor: pointer;
    background: var(--paper);
    color: var(--ink);
    letter-spacing: 0.04em;
    transition: all 0.15s;
    text-align: center;
  }
  .ans-btn:hover:not(:disabled) { background: var(--paper2); border-color: var(--ink); }
  .ans-btn.correct { background: #e8f5e9; border-color: var(--correct); color: var(--correct); font-weight: 700; }
  .ans-btn.wrong   { background: #ffebee; border-color: var(--wrong);   color: var(--wrong);   }
  .ans-btn:disabled { cursor: default; }

  /* Feedback */
  #feedback {
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    min-height: 22px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--correct);
  }
  #feedback.wrong-fb { color: var(--wrong); }

  /* Next button */
  #next-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    padding: 9px 28px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  #next-btn.visible { opacity: 1; pointer-events: all; }

  /* Progress strip */
  .progress-strip {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 560px;
    margin-top: 14px;
  }
  .pip {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ddd;
    border: 1px solid #c9b99a;
  }
  .pip.ok  { background: var(--correct); border-color: var(--correct); }
  .pip.bad { background: var(--wrong);   border-color: var(--wrong); }

  /* Clef label */
  .clef-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--line);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  footer {
    margin-top: 32px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: #bbb;
    letter-spacing: 0.08em;
  }

  /* Main page tabs */
  .page-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 22px;
    border: 1.5px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  .page-tab {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    padding: 8px 22px;
    border: none;
    cursor: pointer;
    background: var(--paper2);
    color: var(--line);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.18s;
    border-right: 1px solid var(--line);
  }
  .page-tab:last-child { border-right: none; }
  .page-tab.active { background: var(--ink); color: var(--paper); }

  /* Sections */
  .section { width: 100%; max-width: 560px; display: none; flex-direction: column; align-items: center; gap: 0; }
  .section.active { display: flex; }

  /* ── Sequencer ── */
  .seq-card {
    background: white;
    border: 1.5px solid #c9b99a;
    border-radius: 6px;
    width: 100%;
    padding: 22px 20px 20px;
    box-shadow: 4px 6px 0 #c9b99a44;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .seq-section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--line);
    margin-bottom: 6px;
  }

  /* Note grid */
  .note-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .ng-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 6px 9px;
    border: 1.5px solid #c9b99a;
    border-radius: 3px;
    cursor: pointer;
    background: var(--paper);
    color: var(--ink);
    transition: all 0.12s;
    min-width: 40px;
    text-align: center;
  }
  .ng-btn:hover { background: var(--paper2); border-color: var(--ink); }
  .ng-btn.selected { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* Duration grid */
  .dur-grid {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .dur-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 7px 12px;
    border: 1.5px solid #c9b99a;
    border-radius: 3px;
    cursor: pointer;
    background: var(--paper);
    color: var(--ink);
    transition: all 0.12s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }
  .dur-btn:hover { background: var(--paper2); border-color: var(--ink); }
  .dur-btn.selected { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .dur-symbol { font-size: 1rem; line-height: 1; }
  .dur-label  { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.7; }

  /* Add button */
  #seq-add-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    padding: 9px 0;
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }
  #seq-add-btn:disabled { opacity: 0.35; cursor: default; }

  /* Sequence display */
  .seq-display {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 62px;
    background: var(--paper);
    border: 1.5px dashed #c9b99a;
    border-radius: 4px;
    padding: 10px;
    align-items: flex-end;
  }
  .seq-note-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    padding: 4px 7px;
    border-radius: 3px;
    border: 1.5px solid transparent;
    transition: all 0.12s;
    position: relative;
  }
  .seq-note-chip:hover { border-color: var(--wrong); background: #fff0f0; }
  .seq-note-chip.playing { background: #fff8e1; border-color: var(--gold); }
  .seq-note-chip .chip-western {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }
  .seq-note-chip .chip-dur {
    font-size: 0.9rem;
    line-height: 1;
  }
  .seq-note-chip .chip-jianpu {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--line);
    line-height: 1;
  }
  .seq-empty {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: #bbb;
    letter-spacing: 0.06em;
    align-self: center;
    margin: auto;
  }

  /* BPM */
  .bpm-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bpm-row label {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--line);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  #bpm-slider {
    flex: 1;
    accent-color: var(--ink);
  }
  #bpm-val {
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--ink);
    min-width: 36px;
    text-align: right;
  }

  /* Playback controls */
  .seq-controls {
    display: flex;
    gap: 8px;
  }
  .seq-ctrl-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    padding: 9px 0;
    flex: 1;
    border: 1.5px solid var(--line);
    border-radius: 3px;
    cursor: pointer;
    background: var(--paper);
    color: var(--ink);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .seq-ctrl-btn:hover { background: var(--paper2); }
  .seq-ctrl-btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .seq-ctrl-btn.primary:hover { opacity: 0.85; }
  .seq-ctrl-btn:disabled { opacity: 0.35; cursor: default; }
  .seq-ctrl-btn.loop-on { background: var(--gold); color: white; border-color: var(--gold); }

  /* Volume toggle */
  #vol-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--paper2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    color: var(--ink);
    transition: all 0.15s;
    box-shadow: 2px 2px 0 #c9b99a66;
    z-index: 100;
  }
  #vol-btn:hover { background: var(--paper); border-color: var(--ink); }
  #vol-btn.muted { color: var(--line); background: #eee; }
</style>
</head>
<body>

<header>
  <h1>Note <span>Reader</span></h1>
  <p>Lyre Harp · Guzheng · Practice</p>
</header>

<!-- Main page tabs -->
<div class="page-tabs">
  <button class="page-tab active" onclick="switchPage('practice')">🎵 Practice</button>
  <button class="page-tab" onclick="switchPage('sequencer')">🎼 Sequencer</button>
</div>

<!-- ═══ PRACTICE SECTION ═══ -->
<div class="section active" id="page-practice">

<!-- Instrument selector -->
<div class="inst-bar">
  <button class="inst-btn active" onclick="setInstrument('lyre')">🎵 Lyre Harp</button>
  <button class="inst-btn" onclick="setInstrument('guzheng')">🎶 Guzheng</button>
</div>

<!-- Score -->
<div class="score-bar">
  <div>Correct <span id="sc-correct">0</span></div>
  <div>Wrong <span id="sc-wrong">0</span></div>
  <div>Streak <span id="sc-streak">0</span></div>
</div>

<!-- Card -->
<div class="card">
  <div class="notation-tabs">
    <button class="ntab active" onclick="setNotation('staff')">Staff</button>
    <button class="ntab" onclick="setNotation('jianpu')">Jianpu</button>
    <button class="ntab" onclick="setNotation('both')">Both</button>
  </div>

  <div class="clef-label" id="clef-label">Treble Clef</div>

  <!-- Staff notation -->
  <div id="staff-area">
    <svg id="staff-svg" width="320" height="160" viewBox="0 0 320 160"></svg>
  </div>

  <!-- Jianpu notation -->
  <div id="jianpu-area">
    <div class="jianpu-dots-above" id="jianpu-dots-above"></div>
    <div class="jianpu-number" id="jianpu-num">?</div>
    <div class="jianpu-dots-below" id="jianpu-dots-below"></div>
  </div>

  <div class="answers" id="answers"></div>
  <div id="feedback"></div>
  <button id="next-btn" onclick="nextNote()">Next →</button>
</div>

<!-- Progress pips -->
<div class="progress-strip" id="progress-strip"></div>

</div><!-- end #page-practice -->

<!-- ═══ SEQUENCER SECTION ═══ -->
<div class="section" id="page-sequencer">
  <div class="seq-card">

    <!-- Note picker -->
    <div>
      <div class="seq-section-label">1 · Pick a note</div>
      <div class="note-grid" id="seq-note-grid"></div>
    </div>

    <!-- Duration picker -->
    <div>
      <div class="seq-section-label">2 · Pick a duration</div>
      <div class="dur-grid" id="seq-dur-grid"></div>
    </div>

    <!-- Add button -->
    <button id="seq-add-btn" disabled onclick="seqAddNote()">+ Add to Sequence</button>

    <!-- Sequence display -->
    <div>
      <div class="seq-section-label">Sequence <span id="seq-count" style="color:var(--ink);font-weight:700"></span> <span style="color:#bbb;font-size:0.6rem">(tap a note to remove)</span></div>
      <div class="seq-display" id="seq-display">
        <span class="seq-empty">No notes yet — pick a note and duration above</span>
      </div>
    </div>

    <!-- BPM -->
    <div class="bpm-row">
      <label>♩ = BPM</label>
      <input type="range" id="bpm-slider" min="40" max="200" value="80" oninput="document.getElementById('bpm-val').textContent=this.value">
      <span id="bpm-val">80</span>
    </div>

    <!-- Controls -->
    <div class="seq-controls">
      <button class="seq-ctrl-btn primary" id="seq-play-btn" onclick="seqPlay()" disabled>▶ Play</button>
      <button class="seq-ctrl-btn" id="seq-loop-btn" onclick="seqToggleLoop()">↺ Loop</button>
      <button class="seq-ctrl-btn" onclick="seqStop()">■ Stop</button>
      <button class="seq-ctrl-btn" onclick="seqClear()">🗑 Clear</button>
    </div>

  </div>
</div><!-- end #page-sequencer -->

<!-- Progress pips (practice only, moved inside practice section above) -->

<footer>G3–A5 Lyre · D2–A5 Guzheng · Western + Jianpu</footer>

<button id="vol-btn" onclick="toggleMute()" title="Toggle sound">🔔</button>

<script>
// ─── Note definitions ───────────────────────────────────────────
// Each note: name, octave, staffPos (steps from middle C = 0, positive=up)
// Treble clef: middle line = B4 = staffPos 6
// Bass clef: middle line = D3 = staffPos -6

const NOTE_NAMES_SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_NAMES_FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

// Diatonic note positions from C4 (middle C) in staff steps
// C4=0, D4=1, E4=2, F4=3, G4=4, A4=5, B4=6, C5=7, ...
// C3=-7, D3=-6, etc.
function noteToStaffPos(name, octave) {
  const diatonic = {'C':0,'D':1,'E':2,'F':3,'G':4,'A':5,'B':6};
  const base = name.replace('#','').replace('b','');
  return diatonic[base] + (octave - 4) * 7;
}

function midiFromNote(name, octave) {
  const semi = {'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11};
  return 12 + octave*12 + semi[name];
}

// Jianpu: 1=C, 2=D, 3=E, 4=F, 5=G, 6=A, 7=B
// Dots above = higher octave, dots below = lower octave (relative to C4 = 1)
function noteToJianpu(name, octave) {
  const jMap = {'C':1,'D':2,'E':3,'F':4,'G':5,'A':6,'B':7,
                'C#':1,'D#':2,'F#':4,'G#':5,'A#':6, // accidentals use base
                'Db':2,'Eb':3,'Gb':5,'Ab':6,'Bb':7};
  const num = jMap[name] || jMap[name.replace('#','').replace('b','')];
  const octaveDiff = octave - 4; // relative to octave 4 (C4=1 in jianpu standard)
  let dotsAbove = '', dotsBelow = '';
  if (octaveDiff > 0) dotsAbove = '·'.repeat(octaveDiff);
  if (octaveDiff < 0) dotsBelow = '·'.repeat(-octaveDiff);
  return { num, dotsAbove, dotsBelow, hasAccidental: name.includes('#') || name.includes('b') };
}

// Build note pool for each instrument
function buildPool(instrument) {
  const notes = [];
  // Diatonic notes only for clean practice
  const diatonic = ['C','D','E','F','G','A','B'];
  let ranges;
  if (instrument === 'lyre') {
    // G3–A5 (16 strings, diatonic)
    ranges = [{octave:3, notes:['G','A','B']}, {octave:4, notes:diatonic}, {octave:5, notes:['C','D','E','F','G','A']}];
  } else {
    // Guzheng D2–A5 (pentatonic + some extra)
    const penta = ['D','E','G','A','B']; // standard D pentatonic
    ranges = [
      {octave:2, notes:['D','E','G','A','B']},
      {octave:3, notes:penta},
      {octave:4, notes:penta},
      {octave:5, notes:['D','E','G','A']},
    ];
  }
  for (const r of ranges) {
    for (const n of r.notes) {
      notes.push({ name: n, octave: r.octave });
    }
  }
  return notes;
}

// ─── State ───────────────────────────────────────────────────────
let pool = buildPool('lyre');
let currentNote = null;
let answered = false;
let scoreCorrect = 0, scoreWrong = 0, streak = 0;
let history = []; // 'ok' | 'bad'
let notationMode = 'staff'; // 'staff' | 'jianpu' | 'both'
let instrument = 'lyre';

// ─── Instrument / notation setters ───────────────────────────────
function setInstrument(inst) {
  instrument = inst;
  pool = buildPool(inst);
  document.querySelectorAll('.inst-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(inst === 'lyre' ? 'lyre' : 'guzh')));
  nextNote();
}

function setNotation(mode) {
  notationMode = mode;
  document.querySelectorAll('.ntab').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === mode));
  if (currentNote) renderNotation(currentNote);
}

// ─── Staff drawing ────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';

function drawStaff(note) {
  const svg = document.getElementById('staff-svg');
  svg.innerHTML = '';
  const W = 320, H = 160;
  const staffTop = 40; // y of top staff line
  const lineGap = 10;  // gap between staff lines (= 1 step)
  const noteX = W / 2;

  // Determine clef: notes below C4 use bass clef
  const useBassCl = note.octave < 4 || (note.octave === 4 && ['C','D'].includes(note.name) && instrument === 'guzheng');
  document.getElementById('clef-label').textContent = useBassCl ? 'Bass Clef' : 'Treble Clef';

  // Staff lines (5 lines)
  for (let i = 0; i < 5; i++) {
    const y = staffTop + i * lineGap * 2;
    const line = document.createElementNS(SVG_NS, 'line');
    line.setAttribute('x1', 40); line.setAttribute('x2', W - 40);
    line.setAttribute('y1', y); line.setAttribute('y2', y);
    line.setAttribute('stroke', '#3a2e1a'); line.setAttribute('stroke-width', '1.2');
    svg.appendChild(line);
  }

  // Clef symbol
  const clefText = document.createElementNS(SVG_NS, 'text');
  if (!useBassCl) {
    // Treble clef (unicode)
    clefText.setAttribute('x', '44'); clefText.setAttribute('y', staffTop + lineGap*5);
    clefText.setAttribute('font-size', '68'); clefText.setAttribute('fill', '#3a2e1a');
    clefText.textContent = '𝄞';
  } else {
    // Bass clef
    clefText.setAttribute('x', '44'); clefText.setAttribute('y', staffTop + lineGap*3.5);
    clefText.setAttribute('font-size', '44'); clefText.setAttribute('fill', '#3a2e1a');
    clefText.textContent = '𝄢';
  }
  svg.appendChild(clefText);

  // Calculate note Y position
  // Treble: top line = F5 (staffPos=9), each step = lineGap down
  // Bass: top line = A3 (staffPos=2), each step = lineGap down
  let topLinePos;
  if (!useBassCl) {
    topLinePos = noteToStaffPos('F', 5); // F5 = top line of treble
  } else {
    topLinePos = noteToStaffPos('A', 3); // A3 = top line of bass
  }

  const notePos = noteToStaffPos(note.name, note.octave);
  const stepsFromTop = topLinePos - notePos;
  const noteY = staffTop + stepsFromTop * lineGap;

  // Ledger lines
  const staffBottomPos = useBassCl ? noteToStaffPos('G', 1) : noteToStaffPos('E', 4);
  const staffTopPos = useBassCl ? noteToStaffPos('A', 3) : noteToStaffPos('F', 5);

  // Draw ledger lines if note is outside staff
  if (notePos > staffTopPos) {
    // Above
    for (let p = staffTopPos + 2; p <= notePos + (notePos % 2 === staffTopPos % 2 ? 0 : 1); p += 2) {
      const ly = staffTop + (topLinePos - p) * lineGap;
      if (ly < staffTop - lineGap * 0.5) {
        addLedgerLine(svg, noteX, ly, '#3a2e1a');
      }
    }
  }
  if (notePos < (staffTopPos - 8)) {
    // Below staff (bottom line pos)
    const bottomLinePos = staffTopPos - 8;
    for (let p = bottomLinePos - 2; p >= notePos - (notePos % 2 === bottomLinePos % 2 ? 0 : 1); p -= 2) {
      const ly = staffTop + (topLinePos - p) * lineGap;
      if (ly > staffTop + lineGap * 8 + lineGap * 0.5) {
        addLedgerLine(svg, noteX, ly, '#3a2e1a');
      }
    }
  }
  // Middle C ledger line
  const middleCPos = noteToStaffPos('C', 4);
  if (notePos === middleCPos) {
    addLedgerLine(svg, noteX, staffTop + (topLinePos - middleCPos) * lineGap, '#3a2e1a');
  }

  // Note head
  const ellipse = document.createElementNS(SVG_NS, 'ellipse');
  ellipse.setAttribute('cx', noteX);
  ellipse.setAttribute('cy', noteY);
  ellipse.setAttribute('rx', '7');
  ellipse.setAttribute('ry', '5.5');
  ellipse.setAttribute('fill', '#c0392b');
  ellipse.setAttribute('transform', `rotate(-15, ${noteX}, ${noteY})`);
  svg.appendChild(ellipse);

  // Stem
  const stem = document.createElementNS(SVG_NS, 'line');
  const stemUp = noteY > staffTop + lineGap * 4;
  stem.setAttribute('x1', stemUp ? noteX + 6 : noteX - 6);
  stem.setAttribute('x2', stemUp ? noteX + 6 : noteX - 6);
  stem.setAttribute('y1', noteY);
  stem.setAttribute('y2', stemUp ? noteY - 35 : noteY + 35);
  stem.setAttribute('stroke', '#c0392b');
  stem.setAttribute('stroke-width', '1.5');
  svg.appendChild(stem);

  // Accidental
  if (note.name.includes('#')) {
    const acc = document.createElementNS(SVG_NS, 'text');
    acc.setAttribute('x', noteX - 18); acc.setAttribute('y', noteY + 5);
    acc.setAttribute('font-size', '14'); acc.setAttribute('fill', '#3a2e1a');
    acc.textContent = '♯';
    svg.appendChild(acc);
  } else if (note.name.includes('b')) {
    const acc = document.createElementNS(SVG_NS, 'text');
    acc.setAttribute('x', noteX - 18); acc.setAttribute('y', noteY + 5);
    acc.setAttribute('font-size', '14'); acc.setAttribute('fill', '#3a2e1a');
    acc.textContent = '♭';
    svg.appendChild(acc);
  }
}

function addLedgerLine(svg, cx, y, color) {
  const l = document.createElementNS(SVG_NS, 'line');
  l.setAttribute('x1', cx - 12); l.setAttribute('x2', cx + 12);
  l.setAttribute('y1', y); l.setAttribute('y2', y);
  l.setAttribute('stroke', color); l.setAttribute('stroke-width', '1.2');
  svg.appendChild(l);
}

// ─── Jianpu rendering ─────────────────────────────────────────────
function drawJianpu(note) {
  const j = noteToJianpu(note.name, note.octave);
  document.getElementById('jianpu-num').textContent = j.num + (j.hasAccidental ? (note.name.includes('#') ? '♯' : '♭') : '');
  document.getElementById('jianpu-dots-above').textContent = j.dotsAbove;
  document.getElementById('jianpu-dots-below').textContent = j.dotsBelow;
}

// ─── Render both notations based on mode ─────────────────────────
function renderNotation(note) {
  const staffArea = document.getElementById('staff-area');
  const jianpuArea = document.getElementById('jianpu-area');

  if (notationMode === 'staff') {
    staffArea.style.display = 'flex';
    jianpuArea.classList.remove('visible');
    drawStaff(note);
  } else if (notationMode === 'jianpu') {
    staffArea.style.display = 'none';
    jianpuArea.classList.add('visible');
    drawJianpu(note);
  } else { // both
    staffArea.style.display = 'flex';
    jianpuArea.classList.add('visible');
    drawStaff(note);
    drawJianpu(note);
  }
}

// ─── Answer choices ───────────────────────────────────────────────
function buildChoices(correct) {
  // Get all unique note names in pool
  const allNames = [...new Set(pool.map(n => n.name + n.octave))];
  // Build wrong choices from same pool
  const wrong = allNames.filter(n => n !== correct.name + correct.octave);
  // Shuffle and pick 5
  const shuffled = wrong.sort(() => Math.random() - 0.5).slice(0, 5);
  // Format label
  const all = [...shuffled, correct.name + correct.octave].sort(() => Math.random() - 0.5);
  return all.map(id => {
    const n = id.replace(/\d/g,'');
    const o = parseInt(id.match(/\d/)[0]);
    return { id, label: n + o, noteName: n, octave: o };
  });
}

function renderAnswers(choices, correctId) {
  const div = document.getElementById('answers');
  div.innerHTML = '';
  choices.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = ch.label;
    btn.onclick = () => checkAnswer(ch.id, correctId);
    div.appendChild(btn);
  });
}

// ─── Game logic ────────────────────────────────────────────────────
function nextNote() {
  answered = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';
  document.getElementById('next-btn').classList.remove('visible');

  // Pick random note from pool
  currentNote = pool[Math.floor(Math.random() * pool.length)];

  // Render notation
  renderNotation(currentNote);

  // Play the note sound
  playNote(currentNote.name, currentNote.octave, instrument);

  // Build answer choices
  const choices = buildChoices(currentNote);
  renderAnswers(choices, currentNote.name + currentNote.octave);
}

function checkAnswer(chosen, correctId) {
  if (answered) return;
  answered = true;

  const btns = document.querySelectorAll('.ans-btn');
  btns.forEach(b => {
    b.disabled = true;
    const bId = b.textContent.replace('♯','#').replace('♭','b').replace(' ','');
    // normalise label back to id
    const noteN = bId.replace(/[0-9]/g,'');
    const octN  = bId.match(/[0-9]/)?.[0];
    if ((noteN + octN) === correctId) b.classList.add('correct');
    else if ((noteN + octN) === chosen) b.classList.add('wrong');
  });

  const correct = chosen === correctId;
  const fb = document.getElementById('feedback');

  if (correct) {
    scoreCorrect++;
    streak++;
    fb.textContent = '✓ Correct!';
    fb.className = '';
    history.push('ok');
  } else {
    scoreWrong++;
    streak = 0;
    const cn = correctId.replace(/[0-9]/g,'');
    const co = correctId.match(/[0-9]/)[0];
    fb.textContent = `✗ It was ${cn}${co}`;
    fb.className = 'wrong-fb';
    history.push('bad');
  }

  document.getElementById('sc-correct').textContent = scoreCorrect;
  document.getElementById('sc-wrong').textContent = scoreWrong;
  document.getElementById('sc-streak').textContent = streak;

  // Progress pips (last 20)
  const strip = document.getElementById('progress-strip');
  strip.innerHTML = '';
  history.slice(-20).forEach(h => {
    const pip = document.createElement('div');
    pip.className = 'pip ' + h;
    strip.appendChild(pip);
  });

  document.getElementById('next-btn').classList.add('visible');
}

// ─── Audio engine (Web Audio API) ────────────────────────────────
let audioCtx = null;
let soundEnabled = true;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function noteToFreq(name, octave) {
  const semis = {'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,
                 'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11};
  const midi = 12 + octave * 12 + semis[name];
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function playNote(name, octave, inst) {
  if (!soundEnabled) return;
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  const freq = noteToFreq(name, octave);
  const now = ctx.currentTime;

  // Master gain
  const master = ctx.createGain();
  master.connect(ctx.destination);

  if (inst === 'lyre') {
    // Lyre harp: bright pluck — sine + triangle blend, quick decay
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const g1 = ctx.createGain();
    const g2 = ctx.createGain();

    osc1.type = 'triangle';
    osc1.frequency.setValueAtTime(freq, now);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(freq * 2.005, now); // slight detune for shimmer

    g1.gain.setValueAtTime(0.55, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 2.2);
    g2.gain.setValueAtTime(0.18, now);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 1.4);

    master.gain.setValueAtTime(0.55, now);

    osc1.connect(g1); g1.connect(master);
    osc2.connect(g2); g2.connect(master);
    osc1.start(now); osc1.stop(now + 2.5);
    osc2.start(now); osc2.stop(now + 1.8);

    // Attack click for pluck feel
    const click = ctx.createOscillator();
    const cg = ctx.createGain();
    click.frequency.setValueAtTime(freq * 4, now);
    cg.gain.setValueAtTime(0.12, now);
    cg.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
    click.connect(cg); cg.connect(master);
    click.start(now); click.stop(now + 0.05);

  } else {
    // Guzheng: warmer, longer sustain with vibrato-like wobble
    const osc = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    const g = ctx.createGain();
    const g2 = ctx.createGain();

    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq, now);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(freq * 0.998, now);

    // Subtle vibrato via LFO
    lfo.type = 'sine';
    lfo.frequency.setValueAtTime(5.5, now);
    lfoGain.gain.setValueAtTime(0, now);
    lfoGain.gain.linearRampToValueAtTime(freq * 0.004, now + 0.3);
    lfoGain.gain.exponentialRampToValueAtTime(0.001, now + 3.5);
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);

    g.gain.setValueAtTime(0.38, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 3.5);
    g2.gain.setValueAtTime(0.22, now);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 2.8);

    master.gain.setValueAtTime(0.5, now);

    // Low-pass filter for warmth
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2400, now);
    filter.Q.setValueAtTime(1, now);

    osc.connect(g); g.connect(filter); filter.connect(master);
    osc2.connect(g2); g2.connect(master);

    osc.start(now); osc.stop(now + 4);
    osc2.start(now); osc2.stop(now + 3.2);
    lfo.start(now); lfo.stop(now + 4);
  }
}

function toggleMute() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('vol-btn');
  btn.textContent = soundEnabled ? '🔔' : '🔕';
  btn.classList.toggle('muted', !soundEnabled);
}

// ─── Page switching ───────────────────────────────────────────────
function switchPage(page) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.page-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.page-tab').forEach(b => {
    if (b.textContent.toLowerCase().includes(page === 'practice' ? 'practice' : 'sequencer')) b.classList.add('active');
  });
  if (page === 'sequencer') seqBuildGrids();
}

// ─── Sequencer state ──────────────────────────────────────────────
const DURATIONS = [
  { id: 'whole',     label: 'Whole',   symbol: '𝅝',  beats: 4    },
  { id: 'half',      label: 'Half',    symbol: '𝅗𝅥',  beats: 2    },
  { id: 'quarter',   label: 'Quarter', symbol: '♩',  beats: 1    },
  { id: 'eighth',    label: 'Eighth',  symbol: '♪',  beats: 0.5  },
  { id: 'sixteenth', label: '16th',    symbol: '♬',  beats: 0.25 },
];

let seqNotes = [];
let seqSelectedNote = null;
let seqSelectedDur  = null;
let seqLoopOn = false;
let seqTimeouts = [];
let seqPlaying = false;

function seqBuildGrids() {
  const grid = document.getElementById('seq-note-grid');
  grid.innerHTML = '';
  const byOct = {};
  pool.forEach(n => { if (!byOct[n.octave]) byOct[n.octave] = []; byOct[n.octave].push(n.name); });
  Object.keys(byOct).sort().forEach(oct => {
    byOct[oct].forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'ng-btn';
      btn.textContent = name + oct;
      btn.dataset.name = name; btn.dataset.octave = oct;
      btn.onclick = () => seqSelectNote(name, parseInt(oct), btn);
      grid.appendChild(btn);
    });
  });

  const dgrid = document.getElementById('seq-dur-grid');
  dgrid.innerHTML = '';
  DURATIONS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'dur-btn'; btn.dataset.dur = d.id;
    btn.innerHTML = `<span class="dur-symbol">${d.symbol}</span><span class="dur-label">${d.label}</span>`;
    btn.onclick = () => seqSelectDur(d.id, btn);
    dgrid.appendChild(btn);
  });

  seqSelectedNote = null; seqSelectedDur = null;
  document.getElementById('seq-add-btn').disabled = true;
}

function seqSelectNote(name, octave, btn) {
  seqSelectedNote = { name, octave };
  document.querySelectorAll('.ng-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  playNote(name, octave, instrument);
  seqCheckAddReady();
}

function seqSelectDur(durId, btn) {
  seqSelectedDur = durId;
  document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  seqCheckAddReady();
}

function seqCheckAddReady() {
  document.getElementById('seq-add-btn').disabled = !(seqSelectedNote && seqSelectedDur);
}

function seqAddNote() {
  if (!seqSelectedNote || !seqSelectedDur) return;
  seqNotes.push({ ...seqSelectedNote, durId: seqSelectedDur });
  seqRenderDisplay();
}

function noteToJianpuNum(name) {
  const m = {'C':1,'D':2,'E':3,'F':4,'G':5,'A':6,'B':7,
             'C#':1,'D#':2,'F#':4,'G#':5,'A#':6,'Db':2,'Eb':3,'Gb':5,'Ab':6,'Bb':7};
  return m[name] || m[name.replace(/[#b]/g,'')] || '?';
}

function seqRenderDisplay() {
  const el = document.getElementById('seq-display');
  el.innerHTML = '';
  if (seqNotes.length === 0) {
    el.innerHTML = '<span class="seq-empty">No notes yet — pick a note and duration above</span>';
    document.getElementById('seq-play-btn').disabled = true;
    document.getElementById('seq-count').textContent = '';
    return;
  }
  document.getElementById('seq-play-btn').disabled = false;
  document.getElementById('seq-count').textContent = `(${seqNotes.length})`;

  seqNotes.forEach((n, i) => {
    const dur = DURATIONS.find(d => d.id === n.durId);
    const jNum = noteToJianpuNum(n.name);
    const octDiff = n.octave - 4;
    let jLabel = String(jNum);
    if (octDiff > 0) jLabel = '·'.repeat(octDiff) + jLabel;
    if (octDiff < 0) jLabel = jLabel + '·'.repeat(-octDiff);

    const chip = document.createElement('div');
    chip.className = 'seq-note-chip';
    chip.id = 'chip-' + i;
    chip.title = 'Click to remove';
    chip.innerHTML = `
      <span class="chip-western">${n.name}${n.octave}</span>
      <span class="chip-dur">${dur.symbol}</span>
      <span class="chip-jianpu">${jLabel}</span>
    `;
    chip.onclick = () => { if (!seqPlaying) { seqNotes.splice(i, 1); seqRenderDisplay(); } };
    el.appendChild(chip);
  });
}

function seqPlay() {
  if (seqNotes.length === 0) return;
  seqStop();
  seqPlaying = true;
  _seqPlayOnce();
}

function _seqPlayOnce() {
  const bpm = parseInt(document.getElementById('bpm-slider').value);
  const quarterMs = (60 / bpm) * 1000;
  let timeMs = 0;

  seqNotes.forEach((n, i) => {
    const dur = DURATIONS.find(d => d.id === n.durId);
    const noteMs = dur.beats * quarterMs;
    const t = setTimeout(() => {
      if (!seqPlaying) return;
      document.querySelectorAll('.seq-note-chip').forEach(c => c.classList.remove('playing'));
      const chip = document.getElementById('chip-' + i);
      if (chip) chip.classList.add('playing');
      playNoteForDuration(n.name, n.octave, instrument, noteMs / 1000);
    }, timeMs);
    seqTimeouts.push(t);
    timeMs += noteMs;
  });

  const endT = setTimeout(() => {
    document.querySelectorAll('.seq-note-chip').forEach(c => c.classList.remove('playing'));
    if (seqLoopOn && seqPlaying) { _seqPlayOnce(); }
    else { seqPlaying = false; }
  }, timeMs);
  seqTimeouts.push(endT);
}

function seqStop() {
  seqPlaying = false;
  seqTimeouts.forEach(t => clearTimeout(t));
  seqTimeouts = [];
  document.querySelectorAll('.seq-note-chip').forEach(c => c.classList.remove('playing'));
}

function seqToggleLoop() {
  seqLoopOn = !seqLoopOn;
  const btn = document.getElementById('seq-loop-btn');
  btn.classList.toggle('loop-on', seqLoopOn);
  btn.textContent = seqLoopOn ? '↺ Loop ON' : '↺ Loop';
}

function seqClear() {
  seqStop();
  seqNotes = [];
  seqRenderDisplay();
}

function playNoteForDuration(name, octave, inst, durationSec) {
  if (!soundEnabled) return;
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  const freq = noteToFreq(name, octave);
  const now = ctx.currentTime;
  const sustain = Math.max(durationSec * 0.85, 0.08);
  const release = 0.15;

  const master = ctx.createGain();
  master.connect(ctx.destination);
  master.gain.setValueAtTime(0.5, now);
  master.gain.setValueAtTime(0.5, now + sustain);
  master.gain.exponentialRampToValueAtTime(0.001, now + sustain + release);

  if (inst === 'lyre') {
    const osc = ctx.createOscillator(); osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, now);
    const osc2 = ctx.createOscillator(); osc2.type = 'sine';
    osc2.frequency.setValueAtTime(freq * 2.005, now);
    const g1 = ctx.createGain(); g1.gain.setValueAtTime(0.6, now);
    const g2 = ctx.createGain(); g2.gain.setValueAtTime(0.2, now);
    osc.connect(g1); g1.connect(master);
    osc2.connect(g2); g2.connect(master);
    const total = sustain + release + 0.05;
    osc.start(now); osc.stop(now + total);
    osc2.start(now); osc2.stop(now + total);
  } else {
    const osc = ctx.createOscillator(); osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq, now);
    const g = ctx.createGain(); g.gain.setValueAtTime(0.4, now);
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.setValueAtTime(2200, now);
    osc.connect(g); g.connect(filter); filter.connect(master);
    osc.start(now); osc.stop(now + sustain + release + 0.05);
  }
}

nextNote();
</script>
